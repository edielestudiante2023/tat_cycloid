name: Validar y deploy a Dev/QA

on:
  push:
    branches: [develop, feature/*]
  pull_request:
    branches: [develop]

jobs:
  test:
    name: Tests y validacion
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configurar PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'

      - name: Verificar sintaxis PHP
        run: |
          echo "=== Verificando sintaxis PHP ==="
          ERRORS=$(find app -name "*.php" -print0 | xargs -0 -n1 php -l 2>&1 | grep -c "Parse error" || true)
          if [ "$ERRORS" -gt 0 ]; then
            find app -name "*.php" -print0 | xargs -0 -n1 php -l 2>&1 | grep "Parse error"
            echo "FALLO: $ERRORS errores de sintaxis"
            exit 1
          fi
          echo "OK: Sin errores de sintaxis"

  trivy:
    name: Trivy — escaneo de vulnerabilidades
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Escanear con Trivy (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          ignore-unfixed: true

  semgrep:
    name: Semgrep — analisis estatico de seguridad
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Escanear con Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/php
            p/security-audit
            p/secrets

  secrets-scan:
    name: Buscar credenciales expuestas
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Buscar API keys hardcodeadas
        run: |
          echo "=== Buscando credenciales hardcodeadas ==="
          FOUND=0

          # SendGrid
          if grep -rn "SG\.[A-Za-z0-9_-]\{20,\}" app/ public/ tools/ --include="*.php" 2>/dev/null | grep -v "SG.xxxxxx" | grep -v "SG.xxx"; then
            echo "ALERTA: SendGrid API key hardcodeada"
            FOUND=1
          fi

          # OpenAI
          if grep -rn "sk-proj-[A-Za-z0-9]\{20,\}" app/ public/ tools/ --include="*.php" 2>/dev/null; then
            echo "ALERTA: OpenAI API key hardcodeada"
            FOUND=1
          fi

          # Anthropic
          if grep -rn "sk-ant-[A-Za-z0-9]\{20,\}" app/ public/ tools/ --include="*.php" 2>/dev/null; then
            echo "ALERTA: Anthropic API key hardcodeada"
            FOUND=1
          fi

          # BD passwords (DigitalOcean)
          if grep -rn "AVNS_[A-Za-z0-9_]\{10,\}" app/ public/ tools/ --include="*.php" 2>/dev/null; then
            echo "ALERTA: Password de BD hardcodeado"
            FOUND=1
          fi

          if [ "$FOUND" -eq 1 ]; then
            echo "FALLO: Credenciales expuestas en el codigo"
            exit 1
          fi
          echo "OK: Sin credenciales hardcodeadas"

  deploy-qa:
    name: Deploy a Dev/QA (LXC)
    runs-on: ubuntu-latest
    needs: [trivy, semgrep, secrets-scan]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'
    steps:
      - name: Deploy a LXC Dev/QA
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.QA_HOST }}
          username: ${{ secrets.QA_USER }}
          key: ${{ secrets.QA_SSH_KEY }}
          script: |
            cd ${{ secrets.QA_PATH }}
            bash deploy.sh
            echo "Deploy a QA completado: $(date)"
